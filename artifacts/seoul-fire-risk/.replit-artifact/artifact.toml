kind = "web"
previewPath = "/"
title = "서울 119 화재위험 예보"
version = "1.0.0"
id = "artifacts/seoul-fire-risk"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18336

[services.development]
run = "pnpm --filter @workspace/seoul-fire-risk run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/seoul-fire-risk", "run", "build" ]
publicDir = "artifacts/seoul-fire-risk/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18336"
BASE_PATH = "/"
